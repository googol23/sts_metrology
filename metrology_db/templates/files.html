<!DOCTYPE html>
<html>
<head>
    <title>Uploaded Files</title>
    <style>
        body { font-family: Arial; margin: 40px; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .delete-btn {
            background-color: red;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
        }
        .download-btn {
            background-color: green;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h2>Uploaded Files</h2>

{% if files %}
<table>
    <tr>
        <th>Filename</th>
        <th>Size (bytes)</th>
        <th>Last Modified</th>
        <th>Actions</th>
    </tr>
    {% for f in files %}
    <tr>
        <td>{{ f.name }}</td>
        <td>{{ f.size }}</td>
        <td>{{ f.modified }}</td>
        <td>
            <a href="/download/{{ f.name }}"><button class="download-btn">Download</button></a>
            <form action="/delete/{{ f.name }}" method="post" style="display:inline;" onsubmit="return confirm('Delete {{ f.name }}?');">
                <button class="delete-btn" type="submit">Delete</button>
            </form>
        </td>
    </tr>
    {% endfor %}
</table>
{% else %}
<p>No files uploaded yet.</p>
{% endif %}

<p><a href="/">Back to upload</a></p>

</body>
</html>
